<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTubeようやくん</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 32px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 720px;
      border: 1px solid #2a2a2a;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #ff4444;
    }

    input[type="text"]::placeholder {
      color: #555;
    }

    button#summarizeBtn {
      padding: 12px 22px;
      border-radius: 10px;
      border: none;
      background: #ff4444;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button#summarizeBtn:hover { background: #e03333; }
    button#summarizeBtn:disabled { background: #555; cursor: not-allowed; }

    .options {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .option-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #aaa;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option-btn.active {
      background: #ff4444;
      border-color: #ff4444;
      color: #fff;
    }

    #status {
      font-size: 0.88rem;
      color: #888;
      margin-bottom: 16px;
      min-height: 20px;
    }

    #status.error { color: #ff6666; }

    #result {
      display: none;
    }

    #result h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a2a;
    }

    #summaryText {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #d0d0d0;
      white-space: pre-wrap;
    }

    .copy-btn {
      margin-top: 16px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: transparent;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover { border-color: #666; color: #fff; }

    .api-key-section {
      margin-bottom: 20px;
    }

    .api-key-section label {
      font-size: 0.82rem;
      color: #888;
      display: block;
      margin-bottom: 6px;
    }

    .api-key-row {
      display: flex;
      gap: 10px;
    }

    input[type="password"] {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="password"]:focus { border-color: #ff4444; }

    .save-btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: #2a2a2a;
      color: #ccc;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .save-btn:hover { background: #333; }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #444;
      border-top-color: #ff4444;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>🎬 YouTubeようやくん</h1>
  <p class="subtitle">URLを貼るだけで、動画の内容をサクッとまとめるよ！</p>

  <div class="card">

    <!-- APIキー設定 -->
    <div class="api-key-section">
      <label>Groq APIキー（初回のみ入力）</label>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="gsk_..." />
        <button class="save-btn" onclick="saveApiKey()">保存</button>
      </div>
    </div>

    <!-- 要約スタイル -->
    <div class="options">
      <span style="font-size:0.82rem;color:#666;line-height:2;">要約スタイル：</span>
      <button class="option-btn active" data-mode="simple">🧠 ゼロから理解</button>
      <button class="option-btn" data-mode="action">⚡ 実践に落とし込む</button>
      <button class="option-btn" data-mode="tldr">⏱ TL;DR</button>
    </div>

    <!-- URL入力 -->
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="YouTubeのURLを貼り付けてください" />
      <button id="summarizeBtn" onclick="summarize()">要約する</button>
    </div>

    <div id="status"></div>

    <!-- 結果表示 -->
    <div id="result">
      <h2 id="resultTitle">📝 要約</h2>
      <div id="summaryText"></div>
      <button class="copy-btn" onclick="copyResult()">コピー</button>
    </div>

  </div>

  <script>
    let selectedMode = 'simple';

    // APIキーの読み込み
    window.onload = () => {
      const saved = localStorage.getItem('groq_api_key');
      if (saved) document.getElementById('apiKeyInput').value = saved;
    };

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) return;
      localStorage.setItem('groq_api_key', key);
      setStatus('APIキーを保存しました！');
    }

    // スタイル選択
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedMode = btn.dataset.mode;
      });
    });

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.innerHTML = msg;
      el.className = isError ? 'error' : '';
    }

    function extractVideoId(url) {
      const patterns = [
        /[?&]v=([^&]+)/,
        /youtu\.be\/([^?]+)/,
        /embed\/([^?]+)/,
        /shorts\/([^?]+)/,
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    async function fetchTranscript(videoId) {
      const res = await fetch('/api/transcript', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      return data.transcript;
    }

    const modeInstructions = {
      simple: '知識がゼロの中学生に説明するつもりで要約してください。専門用語は使わず、難しい概念はかみ砕いて、「つまりどういうこと？」が分かるように書いてください。見出しと箇条書きを使って読みやすく整理してください。',
      action: 'この動画の内容を、実際にビジネスや日常で今すぐ実践できる形に整理してください。「何をすべきか」「どうやるか」「なぜ効果があるか」の観点でまとめ、すぐに行動に移せるよう具体的なステップや使えるポイントを箇条書きで書いてください。',
      tldr: 'この動画の内容を、その分野の知識がまったくない社会人が読んでも一発で理解できるように、5〜10文でまとめてください。専門用語は使わず、「で、結局何の話？」「それって要するに？」がすぐわかる言葉で書いてください。',
    };

    async function callGroq(transcript, apiKey) {
      const prompt = `以下はYouTube動画の字幕テキストです。${modeInstructions[selectedMode]}\n\n【字幕テキスト】\n${transcript.slice(0, 8000)}\n\n【要約】`;
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: 'あなたは優秀な日本語ライターです。自然で読みやすい日本語で回答してください。翻訳調や不自然な表現は使わず、日本人が普段使うような言葉で書いてください。' },
            { role: 'user', content: prompt },
          ],
          temperature: 0.5,
          max_tokens: 1024,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Groq APIエラー');
      return data.choices[0].message.content;
    }

    async function summarize() {
      const url = document.getElementById('urlInput').value.trim();
      const apiKey = document.getElementById('apiKeyInput').value.trim();

      if (!url) return setStatus('URLを入力してください', true);
      if (!apiKey) return setStatus('Groq APIキーを入力してください', true);

      const videoId = extractVideoId(url);
      if (!videoId) return setStatus('有効なYouTube URLではありません', true);

      const btn = document.getElementById('summarizeBtn');
      btn.disabled = true;
      document.getElementById('result').style.display = 'none';

      try {
        setStatus('<span class="loader"></span>字幕を取得中...');
        const transcript = await fetchTranscript(videoId);

        setStatus('<span class="loader"></span>要約中...');
        const summary = await callGroq(transcript, apiKey);

        document.getElementById('summaryText').textContent = summary;
        document.getElementById('result').style.display = 'block';
        setStatus('✅ 完了！');

        if (apiKey) localStorage.setItem('groq_api_key', apiKey);

      } catch(e) {
        setStatus('❌ ' + e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    function copyResult() {
      const text = document.getElementById('summaryText').textContent;
      navigator.clipboard.writeText(text).then(() => setStatus('コピーしました！'));
    }

    // Enterキーで実行
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') summarize();
    });
  </script>

</body>
</html>
